name: zahra_eye
description: A spiritual cinematic puzzle adventure game exploring holy Islamic sacred places.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Game Engine
  flame: ^1.18.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Audio
  audioplayers: ^6.1.0

  # UI & Animations
  flutter_animate: ^4.5.0

  # Utilities
  uuid: ^4.5.1
  path_provider: ^2.1.5

  # Fonts
  google_fonts: ^6.2.1

  # JSON
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/data/questions/
    - assets/images/locations/
    - assets/audio/music/
    - assets/audio/sfx/